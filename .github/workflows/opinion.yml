name: Fetch Samakal Opinion

on:
  schedule:
    - cron: "0 * * * *"   # 23:00 UTC = 5:00 AM BD time
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start FlareSolverr
        run: |
          docker run -d \
            --name flaresolverr \
            -p 8191:8191 \
            ghcr.io/flaresolverr/flaresolverr:latest

      - name: Wait for FlareSolverr
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8191/health && echo 'Ready' && exit 0
            sleep 2
          done
          docker logs flaresolverr && exit 1
      - name: Run fetch script
        run: python fetch.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add opinion.html
          git commit -m "Daily opinion update" || echo "No changes"
          git push