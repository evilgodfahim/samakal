name: Fetch Samakal Opinion

on:
  schedule:
    - cron: "0 * * * *"   # 23:00 UTC = 5:00 AM BD time
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start Redis
        run: |
          docker network create trawl-net
          docker run -d \
            --name redis \
            --network trawl-net \
            redis:alpine

      - name: Start Trawl
        run: |
          docker run -d \
            --name trawl \
            --network trawl-net \
            -p 8191:8191 \
            -e REDIS_URL=redis://redis:6379 \
            -e BROWSER_POOL_SIZE=2 \
            -e RESIDENTIAL_PROXY_URL=${{ secrets.WEBSHARE_PROXY_URL }} \
            ghcr.io/germondai/trawl:latest

      - name: Wait for Trawl
        run: |
          for i in $(seq 1 40); do
            curl -sf http://localhost:8191/health && echo 'Trawl ready' && exit 0
            sleep 2
          done
          docker logs trawl && exit 1
      - name: Run fetch script
        run: python fetch.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add opinion.html
          git commit -m "Daily opinion update" || echo "No changes"
          git push